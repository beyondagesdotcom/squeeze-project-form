<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Squeeze Project — Donation Admin</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f5f5f5; color:#1a1a1a; }
  .topbar { background:#1a1a1a; color:white; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; }
  .topbar h1 { font-size:16px; font-weight:700; }
  .topbar a { color:#aaa; font-size:13px; text-decoration:none; }
  .topbar a:hover { color:white; }
  .stats-bar { background:white; border-bottom:1px solid #e0e0e0; padding:16px 24px; display:flex; gap:24px; flex-wrap:wrap; align-items:center; }
  .stat { text-align:center; }
  .stat .value { font-size:22px; font-weight:900; }
  .stat .label { font-size:11px; color:#888; margin-top:2px; }
  .stat.grand .value { color:#1a1a1a; }
  .fee-info { margin-left:auto; background:#fffbeb; border:1px solid #fde68a; border-radius:6px; padding:8px 14px; font-size:11px; color:#92400e; }
  .container { max-width:1100px; margin:24px auto; padding:0 16px; display:grid; gap:20px; }
  .card { background:white; border-radius:10px; border:1px solid #e0e0e0; overflow:hidden; }
  .card-header { padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
  .card-header h2 { font-size:15px; font-weight:700; }
  .card-header .camp { font-size:12px; color:#888; }
  .progress-wrap { padding:0 18px 12px; }
  .progress-bar-bg { background:#f0f0f0; border-radius:4px; height:8px; margin-bottom:6px; }
  .progress-bar-fill { height:8px; border-radius:4px; transition:width .3s; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:#555; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#f9f9f9; }
  thead th { padding:9px 14px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#888; border-bottom:2px solid #e0e0e0; }
  tbody tr:hover { background:#fafafa; }
  tbody td { padding:8px 14px; font-size:13px; border-bottom:1px solid #f0f0f0; }
  .platform { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; }
  .p-stripe { background:#635bff22; color:#635bff; }
  .p-venmo { background:#3d95ce22; color:#1d7ab3; }
  .p-zelle { background:#6d1ed422; color:#6d1ed4; }
  .p-check { background:#16a34a22; color:#16a34a; }
  .total-row td { font-weight:700; background:#f9f9f9; border-top:2px solid #e0e0e0; }
  .loading { text-align:center; padding:40px; color:#888; }
  .error { text-align:center; padding:40px; color:#dc2626; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🍋 The Squeeze Project — Donation Admin</h1>
  <a href="/Squeeze_Project_Donations_v2.xlsx" download>📥 Download Excel</a>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="loading">Loading...</div>
</div>

<div class="container" id="container">
  <div class="loading">Loading donation data...</div>
</div>

<script>
const PLATFORMS = {stripe:'Stripe',venmo:'Venmo',zelle:'Zelle',check:'Check/Other'};
const FEE_RATES = {stripe:r=>r*0.029+0.30, venmo:r=>r*0.019+0.10, zelle:_=>0, check:_=>0};

async function load() {
  try {
    const res = await fetch('/data/donations.json?v=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('stats-bar').innerHTML = '<div class="error">Failed to load data</div>';
    document.getElementById('container').innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

function fmt(n) { return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function pct(raised, goal) { return Math.min(100, Math.round(raised/goal*100)); }

function calcFees(donations) {
  return donations.reduce((sum, d) => sum + (FEE_RATES[d.platform] ? FEE_RATES[d.platform](d.amount) : 0), 0);
}

function render(data) {
  const ambassadors = data.ambassadors;
  const grand = data.grand_total;
  const goal = data.goal || 6750;
  let totalFees = 0;
  Object.values(ambassadors).forEach(a => { totalFees += calcFees(a.donations || []); });
  const net = grand - totalFees;

  // Stats bar
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat grand"><div class="value">${fmt(grand)}</div><div class="label">Total Raised</div></div>
    <div class="stat"><div class="value" style="color:#888">${fmt(totalFees)}</div><div class="label">Est. Fees</div></div>
    <div class="stat"><div class="value" style="color:#16a34a">${fmt(net)}</div><div class="label">Est. Net</div></div>
    <div class="stat"><div class="value" style="color:#6b21a8">${pct(grand,goal)}%</div><div class="label">of ${fmt(goal)} goal</div></div>
    ${Object.entries(ambassadors).map(([k,a])=>`
      <div class="stat">
        <div class="value" style="color:${a.color||'#333'}">${fmt(a.raised)}</div>
        <div class="label">${a.name||k}</div>
      </div>`).join('')}
    <div class="fee-info">Fee rates: Venmo 1.9%+$0.10 &nbsp;|&nbsp; Stripe 2.9%+$0.30 &nbsp;|&nbsp; Check/Zelle free</div>
  `;

  // Ambassador cards
  document.getElementById('container').innerHTML = Object.entries(ambassadors).map(([key, amb]) => {
    const donations = amb.donations || [];
    const fees = calcFees(donations);
    const net = amb.raised - fees;
    const p = pct(amb.raised, amb.goal || 2250);
    const rows = donations.map(d => `
      <tr>
        <td>${d.date}</td>
        <td>${d.name}</td>
        <td>${fmt(d.amount)}</td>
        <td><span class="platform p-${d.platform}">${PLATFORMS[d.platform]||d.platform}</span></td>
        <td style="color:#888;font-size:12px;">${fmt(FEE_RATES[d.platform]?FEE_RATES[d.platform](d.amount):0)}</td>
      </tr>`).join('');
    return `
    <div class="card">
      <div class="card-header" style="border-left:4px solid ${amb.color||'#333'}">
        <div>
          <h2>${amb.name||key}</h2>
          <div class="camp">${amb.camp||''}</div>
        </div>
        <div style="text-align:right;font-size:13px;">
          <div><strong>${fmt(amb.raised)}</strong> raised</div>
          <div style="color:#888;">Net ~${fmt(net)}</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${p}%;background:${amb.color||'#333'}"></div></div>
        <div class="progress-label"><span>${p}% of ${fmt(amb.goal||2250)}</span><span>${donations.length} donors</span></div>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Name</th><th>Amount</th><th>Platform</th><th>Est. Fee</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td colspan="2">TOTAL</td>
            <td>${fmt(amb.raised)}</td>
            <td></td>
            <td style="color:#888;">${fmt(fees)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
